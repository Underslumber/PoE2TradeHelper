name: Apply item base monitoring floor

on:
  push:
    branches:
      - item-base-monitoring-floor

permissions:
  contents: write

jobs:
  apply-and-test:
    runs-on: ubuntu-24.04
    env:
      USER_AGENT: poe2-trade-helper-ci/0.1 (contact: github-actions)
      MARKET_SNAPSHOT_ENABLED: false
      FUNPAY_RUB_SNAPSHOT_ENABLED: false
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: pip
      - name: Внести изменения
        run: |
          python - <<'PY'
          from pathlib import Path

          ROOT = Path.cwd()

          def read(path: str) -> str:
              return (ROOT / path).read_text(encoding="utf-8")

          def write(path: str, text: str) -> None:
              (ROOT / path).write_text(text, encoding="utf-8")

          def replace_once(text: str, old: str, new: str, label: str) -> str:
              count = text.count(old)
              if count != 1:
                  raise RuntimeError(f"{label}: expected one match, found {count}")
              return text.replace(old, new, 1)

          def replace_after(text: str, marker: str, old: str, new: str, label: str) -> str:
              marker_pos = text.find(marker)
              if marker_pos < 0:
                  raise RuntimeError(f"{label}: marker not found")
              old_pos = text.find(old, marker_pos)
              if old_pos < 0:
                  raise RuntimeError(f"{label}: replacement target not found")
              return text[:old_pos] + new + text[old_pos + len(old):]

          def replace_section(text: str, start: str, end: str, replacement: str, label: str) -> str:
              start_pos = text.find(start)
              if start_pos < 0:
                  raise RuntimeError(f"{label}: start marker not found")
              end_pos = text.find(end, start_pos)
              if end_pos < 0:
                  raise RuntimeError(f"{label}: end marker not found")
              return text[:start_pos] + replacement + text[end_pos:]

          trade_path = "app/trade2.py"
          trade = read(trade_path)
          trade = replace_once(
              trade,
              "ITEM_BASE_MARKET_LOW_PRIORITY_MAX_EXALTED = 1.0",
              "ITEM_BASE_MARKET_MIN_ILVL = 78\nITEM_BASE_MARKET_REFRESH_MIN_EXALTED = 10.0",
              "item base constants",
          )
          trade = trade.replace(
              "ITEM_BASE_MARKET_LOW_PRIORITY_MAX_EXALTED",
              "ITEM_BASE_MARKET_REFRESH_MIN_EXALTED",
          )

          old_queries = '''def _item_base_market_query(base_type: str, status: str, min_ilvl: int | None = None) -> dict[str, Any]:
              type_filters: dict[str, Any] = {"rarity": {"option": "normal"}}
              if min_ilvl is not None and min_ilvl > 0:
                  type_filters["ilvl"] = {"min": min_ilvl}
              filters = _priced_trade_filters()
              filters["type_filters"] = {"filters": type_filters}
              return {
                  "status": {"option": status},
                  "type": base_type,
                  "stats": [{"type": "and", "filters": []}],
                  "filters": filters,
              }


          def _item_base_market_overview_query(status: str, min_ilvl: int | None = None) -> dict[str, Any]:
              type_filters: dict[str, Any] = {"rarity": {"option": "normal"}}
              if min_ilvl is not None and min_ilvl > 0:
                  type_filters["ilvl"] = {"min": min_ilvl}
              filters = _priced_trade_filters()
              filters["type_filters"] = {"filters": type_filters}
              return {
                  "status": {"option": status},
                  "stats": [{"type": "and", "filters": []}],
                  "filters": filters,
              }
          '''
          new_queries = '''def _item_base_market_min_ilvl(value: int | None = None) -> int:
              if isinstance(value, int) and value > 0:
                  return max(ITEM_BASE_MARKET_MIN_ILVL, value)
              return ITEM_BASE_MARKET_MIN_ILVL


          def _item_base_market_query(base_type: str, status: str, min_ilvl: int | None = None) -> dict[str, Any]:
              type_filters: dict[str, Any] = {
                  "rarity": {"option": "normal"},
                  "ilvl": {"min": _item_base_market_min_ilvl(min_ilvl)},
              }
              filters = _priced_trade_filters()
              filters["type_filters"] = {"filters": type_filters}
              return {
                  "status": {"option": status},
                  "type": base_type,
                  "stats": [{"type": "and", "filters": []}],
                  "filters": filters,
              }


          def _item_base_market_overview_query(status: str, min_ilvl: int | None = None) -> dict[str, Any]:
              type_filters: dict[str, Any] = {
                  "rarity": {"option": "normal"},
                  "ilvl": {"min": _item_base_market_min_ilvl(min_ilvl)},
              }
              filters = _priced_trade_filters()
              filters["type_filters"] = {"filters": type_filters}
              return {
                  "status": {"option": status},
                  "stats": [{"type": "and", "filters": []}],
                  "filters": filters,
              }
          '''
          trade = replace_once(trade, old_queries, new_queries, "item base query builders")

          old_scan = '''    deprioritized_keys = deprioritized_keys or set()

              # Курсор указывает на позицию после последней выбранной основы (в т.ч. из прохода
              # deprioritized). Это намеренно: второй проход сдвигает курсор к следующей дешёвой
              # основе, обеспечивая round-robin-ротацию deprioritized-основ между циклами сбора.
              def select_normal(*, allow_deprioritized: bool) -> None:
                  nonlocal next_position
                  if remaining <= 0 or len(normal_selected) >= remaining:
                      return
                  position = start
                  examined = 0
                  while examined < len(bases) and len(normal_selected) < remaining:
                      base = bases[position]
                      position = (position + 1) % len(bases)
                      examined += 1
                      keys = _base_market_base_keys(base)
                      if keys & priority_keys or keys & normal_keys:
                          continue
                      if not allow_deprioritized and keys & deprioritized_keys:
                          continue
                      normal_selected.append(base)
                      normal_keys.update(keys)
                      next_position = position

              select_normal(allow_deprioritized=False)
              select_normal(allow_deprioritized=True)
          '''
          new_scan = '''    deprioritized_keys = deprioritized_keys or set()

              # После первичной оценки основы дешевле порога исключаются из повторных
              # фоновых запросов. Неоценённые основы не входят в deprioritized_keys и
              # продолжают участвовать в обходе до получения первой цены.
              def select_normal() -> None:
                  nonlocal next_position
                  if remaining <= 0 or len(normal_selected) >= remaining:
                      return
                  position = start
                  examined = 0
                  while examined < len(bases) and len(normal_selected) < remaining:
                      base = bases[position]
                      position = (position + 1) % len(bases)
                      examined += 1
                      keys = _base_market_base_keys(base)
                      if keys & priority_keys or keys & normal_keys or keys & deprioritized_keys:
                          continue
                      normal_selected.append(base)
                      normal_keys.update(keys)
                      next_position = position

              select_normal()
          '''
          trade = replace_once(trade, old_scan, new_scan, "item base scan policy")

          trade = replace_once(
              trade,
              '''        row_min_ilvl = _to_int(row.get("min_ilvl"))
                  if row_min_ilvl is not None and row_min_ilvl < min_ilvl:
                      continue
                  matching_rows.append({**row, "min_ilvl": min_ilvl})
          ''',
              '''        row_min_ilvl = _to_int(row.get("min_ilvl"))
                  if row_min_ilvl is None or row_min_ilvl < min_ilvl:
                      continue
                  matching_rows.append(row)
          ''',
              "stored min ilvl filtering",
          )

          trade = replace_after(
              trade,
              "async def run_item_base_market_refresh_job(",
              "    q = q.strip()\n    limit = _bounded_item_base_market_limit(limit)\n",
              "    q = q.strip()\n    min_ilvl = _item_base_market_min_ilvl(min_ilvl)\n    limit = _bounded_item_base_market_limit(limit)\n",
              "refresh job ilvl floor",
          )
          trade = replace_after(
              trade,
              "async def run_item_base_market_refresh_job(",
              "\n    priority_recheck_count = 0\n",
              "\n    if previous_rows:\n        previous_rows = _item_base_market_rows_matching_min_ilvl(previous_rows, min_ilvl)\n\n    priority_recheck_count = 0\n",
              "previous rows ilvl scope",
          )
          trade = replace_after(
              trade,
              "def start_item_base_market_refresh_job(",
              "    collection_min_ilvl = None\n",
              "    collection_min_ilvl = _item_base_market_min_ilvl(min_ilvl)\n",
              "start job ilvl floor",
          )
          trade = replace_after(
              trade,
              "async def get_item_base_market(",
              "    display_min_ilvl = min_ilvl if isinstance(min_ilvl, int) and min_ilvl > 0 else None\n    collection_min_ilvl = None\n",
              "    display_min_ilvl = _item_base_market_min_ilvl(min_ilvl)\n    collection_min_ilvl = display_min_ilvl\n",
              "market display ilvl floor",
          )
          if "ITEM_BASE_MARKET_LOW_PRIORITY_MAX_EXALTED" in trade:
              raise RuntimeError("old threshold constant remains")
          write(trade_path, trade)

          tests_path = "tests/test_trade2.py"
          tests = read(tests_path)
          inserted_tests = '''def test_item_base_market_queries_enforce_ilvl_78_floor():
              default_query = trade2._item_base_market_query("Heavy Belt", "any")
              lower_query = trade2._item_base_market_query("Heavy Belt", "any", min_ilvl=70)
              higher_query = trade2._item_base_market_query("Heavy Belt", "any", min_ilvl=82)
              overview_query = trade2._item_base_market_overview_query("any")

              def ilvl_filter(query):
                  return query["filters"]["type_filters"]["filters"]["ilvl"]

              assert trade2._item_base_market_min_ilvl(None) == 78
              assert trade2._item_base_market_min_ilvl(70) == 78
              assert trade2._item_base_market_min_ilvl(82) == 82
              assert ilvl_filter(default_query) == {"min": 78}
              assert ilvl_filter(lower_query) == {"min": 78}
              assert ilvl_filter(higher_query) == {"min": 82}
              assert ilvl_filter(overview_query) == {"min": 78}


          def test_item_base_market_min_ilvl_filter_rejects_legacy_unscoped_rows():
              rows = [
                  {"id": "base:legacy", "min_ilvl": None},
                  {"id": "base:below", "min_ilvl": 77},
                  {"id": "base:eligible", "min_ilvl": 78},
              ]

              filtered = trade2._item_base_market_rows_matching_min_ilvl(rows, 78)

              assert [row["id"] for row in filtered] == ["base:eligible"]


          '''
          tests = replace_once(
              tests,
              "def test_item_base_market_scan_prioritizes_high_demand_rows(monkeypatch):\n",
              inserted_tests + "def test_item_base_market_scan_prioritizes_high_demand_rows(monkeypatch):\n",
              "insert item base floor tests",
          )
          tests = replace_once(
              tests,
              '''        {"id": "base:cheap-ring", "low": 0.5, "recent_listing_count": 9, "high_demand": True},
                  {"id": "base:demand-boots", "recent_listing_count": 5, "high_demand": True},
                  {"id": "base:expensive-amulet", "low": 2.0},
                  {"id": "base:valuable-belt", "low": 6.0},
          ''',
              '''        {"id": "base:cheap-ring", "low": 9.9, "recent_listing_count": 9, "high_demand": True},
                  {"id": "base:demand-boots", "recent_listing_count": 5, "high_demand": True},
                  {"id": "base:expensive-amulet", "low": 10.0},
                  {"id": "base:valuable-belt", "low": 25.0},
          ''',
              "priority threshold fixtures",
          )

          first_policy_test = '''def test_item_base_market_scan_skips_known_sub_10_exalt_bases(monkeypatch):
              monkeypatch.setattr(trade2, "ITEM_BASE_MARKET_SCAN_BATCH_SIZE", 3)
              trade2.ITEM_BASE_MARKET_SCAN_CURSORS.clear()
              bases = [
                  {"id": "base:cheap-ring", "type": "Cheap Ring", "type_ru": "Дешевое кольцо"},
                  {"id": "base:unknown-boots", "type": "Unknown Boots", "type_ru": "Неизвестные ботинки"},
                  {"id": "base:boundary-amulet", "type": "Boundary Amulet", "type_ru": "Граничный амулет"},
                  {"id": "base:cheap-belt", "type": "Cheap Belt", "type_ru": "Дешевый пояс"},
              ]
              previous_rows = [
                  {"id": "base:cheap-ring", "best_native": {"amount": 9.9, "currency": "exalted"}},
                  {"id": "base:boundary-amulet", "best_native": {"amount": 10.0, "currency": "exalted"}},
                  {"id": "base:cheap-belt", "price_currency_groups": [{"currency": "Exalted Orb", "low_amount": 0.8}]},
              ]
              low_priority_keys = trade2._item_base_market_low_priority_base_keys(previous_rows, target="exalted")

              selected, start, next_position, priority_count, normal_count = trade2._item_base_market_scan_batch(
                  bases,
                  ("PoE2 - Test", "exalted", "securable", 78),
                  deprioritized_keys=low_priority_keys,
              )

              assert [base["type"] for base in selected] == ["Unknown Boots", "Boundary Amulet"]
              assert start == 0
              assert next_position == 3
              assert priority_count == 0
              assert normal_count == 2


          '''
          tests = replace_section(
              tests,
              "def test_item_base_market_scan_batch_defers_observed_sub_exalt_bases(",
              "def test_item_base_market_scan_rotates_deprioritized_bases_across_cycles(",
              first_policy_test,
              "replace single cycle threshold test",
          )

          repeated_policy_test = '''def test_item_base_market_scan_never_rechecks_sub_10_exalt_bases_across_cycles(monkeypatch):
              monkeypatch.setattr(trade2, "ITEM_BASE_MARKET_SCAN_BATCH_SIZE", 3)
              trade2.ITEM_BASE_MARKET_SCAN_CURSORS.clear()
              cursor_key = ("PoE2 - Test", "exalted", "securable", 78)
              bases = [
                  {"id": "base:cheap-ring", "type": "Cheap Ring"},
                  {"id": "base:unknown-boots", "type": "Unknown Boots"},
                  {"id": "base:boundary-amulet", "type": "Boundary Amulet"},
                  {"id": "base:cheap-belt", "type": "Cheap Belt"},
              ]
              previous_rows = [
                  {"id": "base:cheap-ring", "low": 9.9},
                  {"id": "base:boundary-amulet", "low": 10.0},
                  {"id": "base:cheap-belt", "low": 1.0},
              ]
              low_priority_keys = trade2._item_base_market_low_priority_base_keys(previous_rows)

              selected_names = []
              for _ in range(4):
                  selected, _start, next_position, _priority_count, _normal_count = trade2._item_base_market_scan_batch(
                      bases,
                      cursor_key,
                      deprioritized_keys=low_priority_keys,
                  )
                  trade2._advance_item_base_market_scan_cursor(cursor_key, next_position)
                  selected_names.append({base["type"] for base in selected})

              assert selected_names == [
                  {"Unknown Boots", "Boundary Amulet"},
                  {"Unknown Boots", "Boundary Amulet"},
                  {"Unknown Boots", "Boundary Amulet"},
                  {"Unknown Boots", "Boundary Amulet"},
              ]


          '''
          tests = replace_section(
              tests,
              "def test_item_base_market_scan_rotates_deprioritized_bases_across_cycles(",
              "def test_item_base_market_scan_uses_larger_batch_for_meta_priority_bases(",
              repeated_policy_test,
              "replace repeated threshold test",
          )
          write(tests_path, tests)

          readme_path = "README.md"
          readme = read(readme_path)
          readme = replace_once(
              readme,
              "- PoB PoE2 + PoE2DB: seed-каталог чистых normal-предметных основ и русские названия; будущие классы вроде мечей, кинжалов, кастетов и топоров исключаются, а фоновый сбор сначала проходит увеличенным batch по метовым слотам poe.ninja и снижает приоритет уже увиденных основ дешевле `1 exalted`.\n",
              "- PoB PoE2 + PoE2DB: seed-каталог чистых normal-предметных основ и русские названия; будущие классы вроде мечей, кинжалов, кастетов и топоров исключаются. Поиск и сравнение цен выполняются для `item level 78+`; после первичного покрытия фоновый сбор повторно обновляет только основы стоимостью не ниже `10 exalted`.\n",
              "README item base policy",
          )
          write(readme_path, readme)

          agents_path = "AGENTS.md"
          agents = read(agents_path)
          policy = "- Актуальная политика `ItemBases`: поиск и сравнение цен выполняй только для `item level 78+`; основы без цены оставляй в первичном rough-обходе, а после оценки полностью исключай из повторных запросов позиции дешевле `10 exalted` и обновляй только основы стоимостью от `10 exalted`.\n"
          if policy not in agents:
              marker = "- Стартовые справочники `/api/trade/leagues`"
              pos = agents.find(marker)
              if pos < 0:
                  raise RuntimeError("AGENTS insertion marker not found")
              agents = agents[:pos] + policy + agents[pos:]
          write(agents_path, agents)

          version_path = "app/version.py"
          version = replace_once(read(version_path), 'APP_VERSION = "0.2.109"', 'APP_VERSION = "0.2.110"', "app version")
          write(version_path, version)

          version_test_path = "tests/test_version.py"
          version_test = replace_once(
              read(version_test_path),
              'assert APP_VERSION == "0.2.109"',
              'assert APP_VERSION == "0.2.110"',
              "version test",
          )
          write(version_test_path, version_test)
          PY
      - name: Установить зависимости
        run: python -m pip install -r requirements.txt
      - name: Проверить синтаксис
        run: python -m compileall mcp_server.py app
      - name: Запустить тесты
        run: python -m pytest -q
      - name: Зафиксировать готовое исправление
        run: |
          rm .github/workflows/apply-item-base-monitoring-floor.yml
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add -A
          git commit -m 'Ограничить мониторинг дорогими основами'
          git push origin HEAD:item-base-monitoring-floor
