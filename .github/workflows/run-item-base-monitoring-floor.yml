name: Run item base monitoring floor

on:
  push:
    branches:
      - item-base-monitoring-floor

permissions:
  contents: write

jobs:
  apply:
    runs-on: ubuntu-24.04
    env:
      USER_AGENT: poe2-trade-helper-ci/0.1 (contact: github-actions)
      MARKET_SNAPSHOT_ENABLED: false
      FUNPAY_RUB_SNAPSHOT_ENABLED: false
    steps:
      - uses: actions/checkout@v4
        with:
          ref: item-base-monitoring-floor
          fetch-depth: 0
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: pip
      - name: Применить подготовленное изменение
        run: |
          awk '/python - <<'"'"'PY'"'"'/{flag=1;next}/^          PY$/{flag=0}flag{sub(/^          /,""); print}' .github/workflows/apply-item-base-monitoring-floor.yml > /tmp/apply_item_base_floor.py
          python /tmp/apply_item_base_floor.py
      - name: Установить зависимости
        run: python -m pip install -r requirements.txt
      - name: Проверить синтаксис
        run: python -m compileall mcp_server.py app
      - name: Запустить тесты
        run: python -m pytest -q
      - name: Зафиксировать готовое исправление
        run: |
          rm .github/workflows/apply-item-base-monitoring-floor.yml
          rm .github/workflows/run-item-base-monitoring-floor.yml
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add -A
          git commit -m 'Ограничить мониторинг дорогими основами'
          git push origin HEAD:item-base-monitoring-floor
