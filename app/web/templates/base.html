<!doctype html>
<html lang="en" data-bs-theme="dark">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>PoE2 Trade Helper</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="/static/app.css">
  {% block head %}{% endblock %}
</head>
<body class="bg-dark text-light">
  <nav class="navbar navbar-dark bg-black mb-3 shadow-sm sticky-top">
    <div class="container-fluid">
      <a class="navbar-brand" href="/">PoE2 Trade Helper</a>
      <div class="d-flex gap-2">
        <a href="/" class="btn btn-outline-light btn-sm">Live trade</a>
        <a href="/economy" class="btn btn-outline-light btn-sm">poe.ninja</a>
        <a href="/export/csv" class="btn btn-outline-light btn-sm">CSV</a>
        <a href="/export/jsonl" class="btn btn-outline-light btn-sm">JSONL</a>
      </div>
    </div>
  </nav>
  <div class="container-fluid">
    {% block content %}{% endblock %}
  </div>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script src="/static/app.js"></script>
  {% block scripts %}{% endblock %}
</body>
</html>
